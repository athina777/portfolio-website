<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header aria-label="Primary">
        <nav role="navigation">
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="assets/resume.html">Resume</a></li>
                <li><a href="assets/about.html">Goals and Objectives</a></li>
                <li><a href="assets/portofolio.html">Portfolio</a></li>
                <li><a href="assets/interview.html">Interview</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section aria-labelledby="contact-heading">
            <figure class="overlay-figure portfolio-hero-figure">
                <img class="bg-photo" src="assets/images/back.jpg" alt="Contact page background">
                <figcaption class="portfolio-hero-caption">
                    <h1 id="contact-heading">Contact</h1>
                    <p>If you would like to share feedback on my work, please use the form below.</p>
                </figcaption>
            </figure>
        </section>

        <form class="site-form" action="#" method="post">
            <label for="name">Name
                <input id="name" type="text" name="name" required>
            </label>

            <label for="email">Email Address
                <input id="email" type="email" name="email" required>
            </label>

            <label for="comments">Comments
                <textarea id="comments" name="comments" rows="6" required></textarea>
            </label>

            <button type="submit">Submit</button>
        </form>
    </main>

    <footer>
        <p>Name: Athina Grigoriadou | Email: athina.grigoriadou.7@gmail.com | Last Edited: June 30, 2026</p>
    </footer>

</body>
</html>
