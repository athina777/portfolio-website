<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header aria-label="Primary">
        <nav role="navigation">
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="assets/resume.html">Resume</a></li>
                <li><a href="assets/about.html">Goals and Objectives</a></li>
                <li><a href="assets/portofolio.html">Portfolio</a></li>
                <li><a href="assets/interview.html">Interview</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact</h1>
        <p>If you'd like to get in touch, send a message using the form below.</p>

        <form id="gmail-contact-form">
            <label style="display:block;margin:12px 0;">Name
                <input type="text" name="name" required style="width:100%;padding:8px;margin-top:6px;border:1px solid #e6e9ee;border-radius:6px;">
            </label>

            <label style="display:block;margin:12px 0;">Email
                <input type="email" name="email" required style="width:100%;padding:8px;margin-top:6px;border:1px solid #e6e9ee;border-radius:6px;">
            </label>

            <label style="display:block;margin:12px 0;">Message
                <textarea name="message" rows="6" required style="width:100%;padding:8px;margin-top:6px;border:1px solid #e6e9ee;border-radius:6px;"></textarea>
            </label>

            <button type="submit" style="background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600">Send Message</button>
        </form>

        <p id="contact-status" style="margin-top:12px;color:var(--muted);"></p>
    </main>

    <script>
        const form = document.getElementById('gmail-contact-form');
        const status = document.getElementById('contact-status');
        const recipientEmail = 'athina.grigoriadou.7@gmail.com';

        form.addEventListener('submit', (event) => {
            event.preventDefault();

            const formData = new FormData(form);
            const name = (formData.get('name') || '').toString().trim();
            const email = (formData.get('email') || '').toString().trim();
            const message = (formData.get('message') || '').toString().trim();

            if (!name || !email || !message) {
                status.textContent = 'Please complete all required fields.';
                return;
            }

            if (recipientEmail === 'YOUR_GMAIL_ADDRESS@gmail.com') {
                status.textContent = 'Set your Gmail address in contact.html first.';
                return;
            }

            const subject = `Portfolio Contact from ${name}`;
            const body = `Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`;

            const params = new URLSearchParams({
                view: 'cm',
                fs: '1',
                to: recipientEmail,
                su: subject,
                body
            });

            const gmailComposeUrl = `https://mail.google.com/mail/?${params.toString()}`;
            const composeWindow = window.open(gmailComposeUrl, '_blank', 'noopener');

            if (!composeWindow) {
                const fallback = `mailto:${recipientEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = fallback;
            }

            status.textContent = 'Gmail compose opened. Send the email from Gmail.';
            form.reset();
        });
    </script>

</body>
</html>
